<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="withdoux picture">
  <title>withdoux picture</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --rose:#e8546a; --gold:#c9a84c; --cream:#fdf6f0; --dark:#1a1219; --surface:#ffffff; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Noto Sans JP',sans-serif; background:var(--cream); min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:16px; }
    h1 { font-family:'Playfair Display',serif; font-size:1.8rem; color:var(--dark); letter-spacing:0.02em; }
    .card { background:var(--surface); border-radius:28px; box-shadow:0 8px 40px rgba(232,84,106,0.10),0 2px 8px rgba(0,0,0,0.06); width:100%; max-width:440px; padding:36px 28px 28px; position:relative; overflow:hidden; }
    .card::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg,var(--rose),var(--gold)); }
    .bg-checker { background-color:#f5f0eb; background-image:linear-gradient(45deg,#e5ddd5 25%,transparent 25%,transparent 75%,#e5ddd5 75%),linear-gradient(45deg,#e5ddd5 25%,transparent 25%,transparent 75%,#e5ddd5 75%); background-size:24px 24px; background-position:0 0,12px 12px; }
    #previewArea { width:100%; aspect-ratio:1/1; border-radius:18px; border:2px dashed #e0d5ce; display:flex; align-items:center; justify-content:center; overflow:hidden; margin-bottom:20px; transition:border-color 0.3s; position:relative; }
    #previewArea img { max-width:100%; max-height:100%; object-fit:contain; }
    #previewArea .placeholder-text { color:#b0a09a; font-size:0.85rem; pointer-events:none; display:flex; flex-direction:column; align-items:center; gap:8px; }
    .preview-wrapper { position:relative; margin-bottom:20px; }
    #resetBtn { position:absolute; top:8px; right:8px; width:30px; height:30px; border-radius:50%; background:rgba(26,18,25,0.65); color:#fff; border:none; cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center; z-index:10; transition:background 0.2s; backdrop-filter:blur(4px); }
    #resetBtn:hover { background:rgba(232,84,106,0.85); }
    .ratio-group { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:20px; }
    .ratio-btn { padding:10px 6px; border-radius:12px; font-size:0.82rem; font-weight:700; border:2px solid #e8ddd8; cursor:pointer; transition:all 0.2s; background:#fff; color:#7a6a65; }
    .ratio-btn.active { background:var(--dark); color:#fff; border-color:var(--dark); }
    .ratio-btn:hover:not(.active) { border-color:var(--rose); color:var(--rose); }
    .btn { width:100%; padding:16px; border-radius:14px; font-weight:700; font-size:0.95rem; cursor:pointer; transition:all 0.2s; border:none; display:flex; align-items:center; justify-content:center; gap:8px; }
    .btn-ghost { background:#f7f1ee; color:#5a4a46; }
    .btn-ghost:hover { background:#ede4df; }
    .btn-primary { background:linear-gradient(135deg,var(--rose),#d63a57); color:#fff; box-shadow:0 4px 20px rgba(232,84,106,0.35); }
    .btn-primary:hover { filter:brightness(1.06); transform:translateY(-1px); }
    .btn-primary:active { transform:translateY(0); }
    .btn-primary:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
    .btn-download { background:linear-gradient(135deg,var(--gold),#b8923a); color:#fff; box-shadow:0 4px 20px rgba(201,168,76,0.35); }
    .btn-download:hover { filter:brightness(1.06); transform:translateY(-1px); }
    .btn-download:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
    .btn-eraser { background:#f0e8f5; color:#6a3a7a; border:2px solid #d4b8e0; font-weight:700; }
    .btn-eraser:hover { background:#e4d0f0; }
    .btn-stack { display:flex; flex-direction:column; gap:10px; }
    .section-divider { display:flex; align-items:center; gap:10px; margin:22px 0 16px; color:#b0a09a; font-size:0.78rem; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; }
    .section-divider::before,.section-divider::after { content:''; flex:1; height:1px; background:#ede4df; }
    .genre-tabs { display:flex; gap:6px; margin-bottom:12px; overflow-x:auto; padding-bottom:2px; scrollbar-width:none; }
    .genre-tabs::-webkit-scrollbar { display:none; }
    .genre-tab { flex-shrink:0; padding:8px 16px; border-radius:20px; border:2px solid #e8ddd8; background:#fff; font-size:0.78rem; font-weight:700; cursor:pointer; color:#7a6a65; transition:all 0.2s; white-space:nowrap; }
    .genre-tab.active { background:var(--dark); color:#fff; border-color:var(--dark); }
    .genre-tab:hover:not(.active) { border-color:var(--rose); color:var(--rose); }
    .preset-scroll { display:flex; gap:8px; overflow-x:auto; padding-bottom:8px; margin-bottom:10px; scrollbar-width:thin; scrollbar-color:#e0d5ce transparent; }
    .preset-scroll::-webkit-scrollbar { height:4px; }
    .preset-scroll::-webkit-scrollbar-track { background:transparent; }
    .preset-scroll::-webkit-scrollbar-thumb { background:#e0d5ce; border-radius:2px; }
    .preset-img-btn { flex-shrink:0; width:76px; height:76px; border-radius:12px; border:3px solid transparent; background-size:cover; background-position:center; cursor:pointer; transition:all 0.2s; background-color:#f0ece6; }
    .preset-img-btn:hover { transform:scale(1.06); }
    .preset-img-btn.selected { border-color:var(--rose); box-shadow:0 0 0 2px rgba(232,84,106,0.3); }
    #statusBadge { display:inline-flex; align-items:center; gap:6px; font-size:0.78rem; font-weight:700; color:#8a7a76; margin-bottom:18px; }
    #statusBadge .dot { width:7px; height:7px; border-radius:50%; background:#c5b8b0; }
    #statusBadge.processing .dot { background:var(--rose); animation:pulse 1s infinite; }
    #statusBadge.done .dot { background:#4caf50; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .spinner { width:18px; height:18px; border:2.5px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .hidden { display:none !important; }
    /* 自動調整バッジ */
    #adjBadge { font-size:0.72rem; color:#8a7a76; background:#f5f0eb; border-radius:8px; padding:6px 10px; margin-bottom:10px; display:none; line-height:1.5; }
    .copy-item { display:flex; align-items:center; gap:8px; background:#fdf7f5; border:1.5px solid #e0d5ce; border-radius:12px; padding:8px 12px; margin-bottom:8px; }
    .copy-item label { font-size:0.72rem; color:#8a7a76; white-space:nowrap; }
    .copy-item input[type="range"] { flex:1; accent-color:var(--rose); }
    .copy-item .copy-size-val { font-size:0.7rem; color:#b0a09a; min-width:32px; text-align:right; }
    .copy-item .remove-btn { width:24px; height:24px; border-radius:50%; border:1.5px solid #e0d5ce; background:#fff; color:#b0a09a; cursor:pointer; font-size:0.85rem; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
    .add-copy-btn { width:100%; padding:10px; background:none; border:1.5px dashed #e0d5ce; border-radius:12px; color:#b0a09a; font-size:0.82rem; font-weight:700; cursor:pointer; margin-bottom:10px; transition:all 0.2s; }
    .add-copy-btn:hover { border-color:var(--rose); color:var(--rose); }
    /* 消しゴムモーダル */
    #eraserModal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.93); z-index:2000; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:16px; }
    #eraserModal p { color:#ccc; font-size:0.82rem; margin-bottom:10px; text-align:center; }
    #eraserCanvasWrap { position:relative; max-width:min(100%,440px); max-height:60vh; background-image:linear-gradient(45deg,#555 25%,transparent 25%,transparent 75%,#555 75%),linear-gradient(45deg,#555 25%,transparent 25%,transparent 75%,#555 75%); background-size:12px 12px; background-position:0 0,6px 6px; border-radius:12px; overflow:hidden; }
    #eraserCanvas { display:block; max-width:100%; max-height:60vh; cursor:crosshair; touch-action:none; }
    #eraserCursor { position:absolute; border-radius:50%; border:2px solid rgba(255,255,255,0.8); pointer-events:none; transform:translate(-50%,-50%); background:rgba(232,84,106,0.25); }
    .eraser-controls { margin-top:14px; width:100%; max-width:440px; display:flex; flex-direction:column; gap:10px; }
    .eraser-controls .row { display:flex; align-items:center; gap:10px; }
    .eraser-controls label { color:#ccc; font-size:0.78rem; white-space:nowrap; }
    .eraser-controls input[type="range"] { flex:1; accent-color:var(--rose); }
    .eraser-controls .btns { display:flex; gap:10px; }
    .eraser-done { flex:1; padding:14px; background:linear-gradient(135deg,var(--rose),#d63a57); color:#fff; border:none; border-radius:14px; font-weight:700; font-size:0.95rem; cursor:pointer; }
    .eraser-cancel { flex:1; padding:14px; background:#333; color:#ccc; border:none; border-radius:14px; font-weight:700; font-size:0.95rem; cursor:pointer; }
    .eraser-undo { padding:14px 18px; background:#444; color:#ccc; border:none; border-radius:14px; font-weight:700; font-size:0.95rem; cursor:pointer; }
  </style>
</head>
<body>

  <div class="card" style="margin-bottom:16px;">
    <div style="text-align:center;margin-bottom:20px;">
      <h1>withdoux picture</h1>
      <p style="color:#b0a09a;font-size:0.8rem;margin-top:4px;">パティシエのための写真加工ツール</p>
    </div>
    <div id="statusBadge"><span class="dot"></span><span id="statusText">お菓子の写真を選択してください</span></div>
    <div class="section-divider">① 背景削除</div>
    <div class="preview-wrapper">
      <div id="previewArea" class="bg-checker">
        <div class="placeholder-text"><span style="font-size:2rem">🎂</span><span>ここに画像が表示されます</span></div>
      </div>
      <button id="resetBtn" class="hidden" onclick="resetAll()" title="画像をリセット">×</button>
    </div>
    <div class="ratio-group">
      <button class="ratio-btn active" onclick="setRatio('1:1',this)"><div style="margin-bottom:4px">◻</div>1:1<div style="font-size:0.65rem;font-weight:400;opacity:0.7">フィード</div></button>
      <button class="ratio-btn" onclick="setRatio('4:5',this)"><div style="margin-bottom:4px">▯</div>4:5<div style="font-size:0.65rem;font-weight:400;opacity:0.7">推奨</div></button>
      <button class="ratio-btn" onclick="setRatio('16:9',this)"><div style="margin-bottom:4px">▭</div>16:9<div style="font-size:0.65rem;font-weight:400;opacity:0.7">横長</div></button>
    </div>
    <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="handleFile(this)">
    <input type="file" id="bgFileInput" accept="image/*" class="hidden" onchange="handleBgFile(this)">
    <div class="btn-stack">
      <button class="btn btn-ghost" onclick="document.getElementById('fileInput').click()">📷 写真を選択</button>
      <button id="magicBtn" class="btn btn-primary hidden" onclick="runMagic()">✨ 魔法をかける（背景削除）</button>
      <button id="fgEraserBtn" class="btn btn-eraser hidden" onclick="openEraser('fg')">🧹 消しゴムで修正する</button>
      <button id="downloadBtn" class="btn btn-download hidden" onclick="downloadImage()">💾 背景削除した画像を保存</button>
    </div>
    <p style="text-align:center;color:#c5b8b0;font-size:0.7rem;margin-top:20px;">Powered by AI Background Removal（無制限・無料）</p>
  </div>

  <div id="compositeSection" class="card hidden">
    <div class="section-divider">② 背景合成</div>
    <div class="genre-tabs">
      <button class="genre-tab active" onclick="selectGenre(this,'simple')">シンプル</button>
      <button class="genre-tab" onclick="selectGenre(this,'table')">テーブル</button>
      <button class="genre-tab" onclick="selectGenre(this,'magazine')">雑誌風</button>
      <button class="genre-tab" onclick="selectGenre(this,'pop')">ポップ</button>
      <button class="genre-tab" onclick="selectGenre(this,'classic')">クラシカル</button>
    </div>
    <div class="preset-scroll" id="presetScroll"></div>
    <button id="bgEraserBtn" class="btn btn-eraser" style="margin-bottom:10px;" onclick="openEraser('bg')">🧹 背景のケーキを消す</button>
    <button class="btn btn-ghost" style="margin-bottom:4px;" onclick="document.getElementById('bgFileInput').click()">🖼 背景画像をアップロード</button>
    <div class="section-divider">位置・サイズを調整</div>
    <div id="compositeEditor" style="position:relative;width:100%;aspect-ratio:1/1;overflow:hidden;border-radius:14px;border:2px solid #e0d5ce;touch-action:none;user-select:none;cursor:grab;background:#f0ece6;background-size:cover;background-position:center;">
      <img id="fgEditorImg" src="" alt="" style="position:absolute;left:50%;top:50%;max-width:80%;max-height:80%;transform:translate(-50%,-50%);transform-origin:left top;pointer-events:none;" />
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin:10px 0 4px;">
      <button onclick="adjustScale(-0.1)" style="width:38px;height:38px;border-radius:50%;border:2px solid #e8ddd8;background:#fff;font-size:1.3rem;cursor:pointer;color:#5a4a46;flex-shrink:0;">&#x2212;</button>
      <input type="range" id="scaleRange" min="20" max="250" value="100" oninput="setScaleFromSlider(this.value)" style="flex:1;accent-color:var(--rose);" />
      <button onclick="adjustScale(0.1)" style="width:38px;height:38px;border-radius:50%;border:2px solid #e8ddd8;background:#fff;font-size:1.3rem;cursor:pointer;color:#5a4a46;flex-shrink:0;">&#xFF0B;</button>
    </div>
    <button onclick="resetEditorTransform()" style="width:100%;font-size:0.72rem;color:#b0a09a;background:none;border:none;cursor:pointer;margin-bottom:10px;">&#x21A9; 配置をリセット</button>
    <div id="copiesList"></div>
    <button id="addCopyBtn" class="add-copy-btn hidden" onclick="addCopy()">＋ 複製を追加</button>
    <div class="btn-stack">
      <button id="compositeBtn" class="btn btn-download" onclick="runComposite()">✨ AI自動調整して保存</button>
    </div>
    <!-- 自動調整結果バッジ -->
    <div id="adjBadge"></div>
    <div id="compositeResultArea" class="hidden">
      <div class="section-divider">合成結果</div>
      <img id="compositeResultImg" src="" alt="合成結果" style="width:100%;border-radius:14px;border:2px solid #e0d5ce;display:block;margin-bottom:12px;" />
      <button class="btn btn-download" onclick="reDownloadComposite()">💾 もう一度ダウンロード</button>
    </div>
  </div>

  <!-- 消しゴムモーダル -->
  <div id="eraserModal" class="hidden">
    <p>指でなぞると消えます　透明部分 = チェック柄</p>
    <div id="eraserCanvasWrap">
      <canvas id="eraserCanvas"></canvas>
      <div id="eraserCursor" style="display:none;"></div>
    </div>
    <div class="eraser-controls">
      <div class="row">
        <label>ブラシサイズ</label>
        <input type="range" id="brushSizeRange" min="5" max="120" value="20" oninput="updateBrushSize(this.value)">
        <span id="brushSizeVal" style="color:#ccc;font-size:0.78rem;min-width:28px;">20</span>
      </div>
      <div class="btns">
        <button class="eraser-undo" onclick="undoEraser()">↩ 戻す</button>
        <button class="eraser-done" onclick="closeEraser(true)">✅ 完了</button>
        <button class="eraser-cancel" onclick="closeEraser(false)">❌ キャンセル</button>
      </div>
    </div>
  </div>

  <script type="importmap">
  { "imports": { "lodash": "https://esm.sh/lodash@4.17.21", "lodash/": "https://esm.sh/lodash@4.17.21/" } }
  </script>

  <script type="module">
    const BASE='https://raw.githubusercontent.com/MIKI-0210/withdoux_pictures/main/%E3%83%97%E3%83%AA%E3%82%BB%E3%83%83%E3%83%88%E7%94%BB%E5%83%8F/';
    const PRESET_GENRES={
      simple:{images:[BASE+'Image%20(1).png',BASE+'%E5%8F%82%E8%80%83%E2%91%A3.jpg',BASE+'%E5%8F%82%E8%80%83%E2%91%A1.jpg',BASE+'%E5%8F%82%E8%80%83%E2%91%A0.jpg',BASE+'Image%2038.png']},
      table:{images:[BASE+'Image%206.png',BASE+'%E3%82%AF%E3%83%A9%E3%82%B7%E3%82%AB%E3%83%AB%E8%83%8C%E6%99%AF%E2%91%A0.png',BASE+'%E3%82%AF%E3%83%A9%E3%82%B7%E3%82%AB%E3%83%AB%E8%83%8C%E6%99%AF%E2%91%A2.png',BASE+'%E3%82%AF%E3%83%A9%E3%82%B7%E3%82%AB%E3%83%AB%E8%83%8C%E6%99%AF%E2%91%A4.png']},
      magazine:{images:[BASE+'%E5%8F%82%E8%80%83%E2%91%A4.jpg',BASE+'%E5%8F%82%E8%80%83%E2%91%A2.jpg',BASE+'Image.png']},
      pop:{images:[BASE+'Image%2016.png',BASE+'Image%2034.png']},
      classic:{images:[BASE+'Image%2077.png',BASE+'Image%2080.jpg',BASE+'%E5%8F%82%E8%80%83%E2%91%A1.jpg']},
    };

    let base64Image='',selectedRatio='1:1',processedBlobUrl='',compositeDataUrl='';
    let selectedBgImageUrl='',customBgUrl='';
    let fgEditorX=0,fgEditorY=0,fgEditorScale=1.0;
    let isDragging=false,dragStartX=0,dragStartY=0;
    let pinchStartDist=0,pinchStartScale=1.0;
    let copies=[];
    const COPY_OFFSETS=[{dx:0.15,dy:0.10},{dx:-0.12,dy:0.18},{dx:0.06,dy:-0.16}];

    // ── 消しゴム状態 ──
    let eraserTarget=null,brushSize=20,isErasing=false,eraserHistory=[];

    // ─────────────────────────────────────────────
    // 画像分析：平均色・明るさ・色温度を返す
    // ─────────────────────────────────────────────
    function analyzeColors(ctx,x,y,w,h){
      const d=ctx.getImageData(x,y,w,h).data;
      let r=0,g=0,b=0,count=0;
      for(let i=0;i<d.length;i+=16){ // 4ピクセルおきにサンプリング
        if(d[i+3]>64){ r+=d[i];g+=d[i+1];b+=d[i+2];count++; }
      }
      if(!count)return{r:128,g:128,b:128,brightness:128,warmth:0};
      r/=count;g/=count;b/=count;
      const brightness=r*0.299+g*0.587+b*0.114;
      const warmth=(r-b)/255; // 正=暖色、負=寒色
      return{r,g,b,brightness,warmth};
    }

    // ─────────────────────────────────────────────
    // スマート自動調整：背景に合わせたフィルター計算
    // ─────────────────────────────────────────────
    function calcSmartFilter(bgCtx,fgImg,imgW,imgH){
      // 背景の中央エリアを分析
      const bg=analyzeColors(bgCtx,imgW*0.1,imgH*0.1,imgW*0.8,imgH*0.8);

      // 前景を仮キャンバスに描画して分析
      const tmp=document.createElement('canvas');
      tmp.width=fgImg.naturalWidth;tmp.height=fgImg.naturalHeight;
      const tCtx=tmp.getContext('2d');
      tCtx.drawImage(fgImg,0,0);
      const fg=analyzeColors(tCtx,0,0,tmp.width,tmp.height);

      // ① 明るさ補正（背景に近づける）
      const rawBright=bg.brightness/Math.max(fg.brightness,1);
      const brightness=Math.max(0.75,Math.min(1.45,rawBright));

      // ② コントラスト（食品写真向けに少し強調）
      const contrast=1.06;

      // ③ 彩度（背景の色鮮やかさに合わせる）
      const bgSat=Math.sqrt((bg.r-bg.g)**2+(bg.g-bg.b)**2+(bg.b-bg.r)**2)/255;
      const saturate=0.92+bgSat*0.6;

      // ④ 色温度（背景の暖色/寒色に合わせて僅かにシフト）
      const warmDiff=bg.warmth-fg.warmth;
      const hueRotate=warmDiff>0.05?-8:warmDiff<-0.05?8:0;

      // ⑤ 自然な傾き（暖色背景=時計回り、寒色=反時計回り、最大±4°）
      const tilt=Math.max(-4,Math.min(4,bg.warmth*6));

      // ⑥ 影を入れると馴染む（canvas shadowを利用）
      const shadowAlpha=Math.min(0.35,bg.brightness/300);

      const filterStr=`brightness(${brightness.toFixed(2)}) contrast(${contrast}) saturate(${saturate.toFixed(2)})${hueRotate?` hue-rotate(${hueRotate}deg)`:''}`;

      return{filterStr,tilt,shadowAlpha,brightness,saturate,hueRotate,tilt};
    }

    // ─────────────────────────────────────────────
    // 消しゴム：開く
    // ─────────────────────────────────────────────
    window.openEraser=async(target)=>{
      const bgUrl=customBgUrl||selectedBgImageUrl;
      if(target==='fg'&&!processedBlobUrl){alert('先に背景削除を実行してください。');return;}
      if(target==='bg'&&!bgUrl){alert('先に背景を選択してください。');return;}
      eraserTarget=target;eraserHistory=[];
      const canvas=document.getElementById('eraserCanvas');
      const ctx=canvas.getContext('2d');
      const imgUrl=target==='fg'?processedBlobUrl:bgUrl;
      const img=new Image();
      if(!imgUrl.startsWith('blob:')&&!imgUrl.startsWith('data:'))img.crossOrigin='anonymous';
      img.onload=()=>{
        canvas.width=img.naturalWidth;canvas.height=img.naturalHeight;
        ctx.clearRect(0,0,canvas.width,canvas.height);ctx.drawImage(img,0,0);
        eraserHistory.push(ctx.getImageData(0,0,canvas.width,canvas.height));
        document.getElementById('eraserModal').classList.remove('hidden');
      };
      img.src=imgUrl;
    };
    window.closeEraser=(save)=>{
      if(save){
        const canvas=document.getElementById('eraserCanvas');
        canvas.toBlob(blob=>{
          const url=URL.createObjectURL(blob);
          if(eraserTarget==='fg'){
            if(processedBlobUrl)URL.revokeObjectURL(processedBlobUrl);
            processedBlobUrl=url;showPreview(processedBlobUrl);
            document.getElementById('fgEditorImg').src=processedBlobUrl;
          }else{
            customBgUrl=url;selectedBgImageUrl='';
            document.querySelectorAll('.preset-img-btn').forEach(b=>b.classList.remove('selected'));
            updateEditorBg(customBgUrl);setStatus('背景の編集完了 ✅','done');
          }
        },'image/png');
      }
      document.getElementById('eraserModal').classList.add('hidden');
    };
    window.updateBrushSize=(val)=>{
      brushSize=+val;document.getElementById('brushSizeVal').textContent=val;
      const c=document.getElementById('eraserCursor');c.style.width=brushSize*2+'px';c.style.height=brushSize*2+'px';
    };
    window.undoEraser=()=>{
      if(eraserHistory.length<=1)return;
      eraserHistory.pop();
      const canvas=document.getElementById('eraserCanvas');
      canvas.getContext('2d').putImageData(eraserHistory[eraserHistory.length-1],0,0);
    };
    function eraseAt(canvas,x,y){
      const ctx=canvas.getContext('2d');
      ctx.globalCompositeOperation='destination-out';
      ctx.beginPath();ctx.arc(x,y,brushSize,0,Math.PI*2);ctx.fill();
      ctx.globalCompositeOperation='source-over';
    }
    function getCanvasPos(canvas,cx,cy){
      const r=canvas.getBoundingClientRect();
      return{x:(cx-r.left)*(canvas.width/r.width),y:(cy-r.top)*(canvas.height/r.height)};
    }
    (()=>{
      const canvas=document.getElementById('eraserCanvas');
      const cursor=document.getElementById('eraserCursor');
      canvas.addEventListener('mousedown',e=>{isErasing=true;const p=getCanvasPos(canvas,e.clientX,e.clientY);eraseAt(canvas,p.x,p.y);});
      canvas.addEventListener('mousemove',e=>{
        const rect=canvas.getBoundingClientRect();
        cursor.style.display='block';cursor.style.left=(e.clientX-rect.left)+'px';cursor.style.top=(e.clientY-rect.top)+'px';
        const s=brushSize*2;cursor.style.width=s*(rect.width/canvas.width)+'px';cursor.style.height=s*(rect.height/canvas.height)+'px';
        if(!isErasing)return;
        eraseAt(canvas,getCanvasPos(canvas,e.clientX,e.clientY).x,getCanvasPos(canvas,e.clientX,e.clientY).y);
      });
      canvas.addEventListener('mouseleave',()=>{cursor.style.display='none';});
      document.addEventListener('mouseup',()=>{
        if(isErasing){isErasing=false;const ctx=canvas.getContext('2d');eraserHistory.push(ctx.getImageData(0,0,canvas.width,canvas.height));if(eraserHistory.length>30)eraserHistory.shift();}
      });
      canvas.addEventListener('touchstart',e=>{e.preventDefault();isErasing=true;const t=e.touches[0];eraseAt(canvas,getCanvasPos(canvas,t.clientX,t.clientY).x,getCanvasPos(canvas,t.clientX,t.clientY).y);},{passive:false});
      canvas.addEventListener('touchmove',e=>{e.preventDefault();if(!isErasing)return;const t=e.touches[0];eraseAt(canvas,getCanvasPos(canvas,t.clientX,t.clientY).x,getCanvasPos(canvas,t.clientX,t.clientY).y);},{passive:false});
      canvas.addEventListener('touchend',()=>{isErasing=false;const ctx=canvas.getContext('2d');eraserHistory.push(ctx.getImageData(0,0,canvas.width,canvas.height));if(eraserHistory.length>30)eraserHistory.shift();});
    })();

    // ─────────────────────────────────────────────
    // メイン機能
    // ─────────────────────────────────────────────
    window.selectGenre=(btn,genre)=>{ document.querySelectorAll('.genre-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');customBgUrl='';renderPresetImages(genre); };
    window.selectPresetImage=(el,url)=>{ document.querySelectorAll('.preset-img-btn').forEach(b=>b.classList.remove('selected'));if(el)el.classList.add('selected');selectedBgImageUrl=url;customBgUrl='';updateEditorBg(url); };
    window.setRatio=(r,btn)=>{ selectedRatio=r;document.querySelectorAll('.ratio-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active'); };
    window.resetAll=()=>{
      base64Image='';processedBlobUrl='';compositeDataUrl='';customBgUrl='';selectedBgImageUrl='';
      document.getElementById('previewArea').innerHTML='<div class="placeholder-text"><span style="font-size:2rem">🎂</span><span>ここに画像が表示されます</span></div>';
      document.getElementById('fileInput').value='';
      hide('resetBtn');hide('magicBtn');hide('fgEraserBtn');hide('downloadBtn');hide('compositeSection');hide('addCopyBtn');
      copies=[];renderCopiesList();setStatus('お菓子の写真を選択してください','');
    };
    window.handleFile=(input)=>{
      if(!input.files||!input.files[0])return;
      const reader=new FileReader();
      reader.onload=(e)=>{
        base64Image=e.target.result;showPreview(base64Image);show('resetBtn');show('magicBtn');
        document.getElementById('magicBtn').innerHTML='✨ 魔法をかける（背景削除）';
        document.getElementById('magicBtn').disabled=false;
        hide('fgEraserBtn');hide('downloadBtn');hide('compositeSection');hide('addCopyBtn');
        copies=[];renderCopiesList();processedBlobUrl='';
        setStatus('準備完了！「魔法をかける」を押してください','');
      };
      reader.readAsDataURL(input.files[0]);
    };
    window.handleBgFile=(input)=>{
      if(!input.files||!input.files[0])return;
      const reader=new FileReader();
      reader.onload=(e)=>{customBgUrl=e.target.result;selectedBgImageUrl='';document.querySelectorAll('.preset-img-btn').forEach(b=>b.classList.remove('selected'));updateEditorBg(customBgUrl);setStatus('背景画像の準備完了 ✅','done');};
      reader.readAsDataURL(input.files[0]);
    };
    window.runMagic=async()=>{
      const btn=document.getElementById('magicBtn');
      setStatus('背景を削除中…（初回はAIモデルのDLで数十秒かかります）','processing');
      btn.disabled=true;btn.innerHTML='<div class="spinner"></div> AI処理中…';
      try{
        const{removeBackground}=await import('https://esm.sh/@imgly/background-removal@1.4.5');
        const res=await fetch(base64Image);const blob=await res.blob();
        const resultBlob=await removeBackground(blob);
        if(processedBlobUrl)URL.revokeObjectURL(processedBlobUrl);
        processedBlobUrl=URL.createObjectURL(resultBlob);
        showPreview(processedBlobUrl);
        setStatus('完成！🎉 必要なら消しゴムで修正できます','done');
        show('fgEraserBtn');show('downloadBtn');show('compositeSection');show('addCopyBtn');hide('magicBtn');
        renderPresetImages('simple');initEditor(processedBlobUrl);
        document.getElementById('compositeSection').scrollIntoView({behavior:'smooth',block:'start'});
      }catch(e){alert('❌ エラー: '+e.message);setStatus('エラーが発生しました','');}
      btn.disabled=false;btn.innerHTML='✨ 魔法をかける（背景削除）';
    };
    window.downloadImage=()=>{
      if(!processedBlobUrl)return;
      const a=document.createElement('a');a.href=processedBlobUrl;a.download=`withdoux_${Date.now()}.png`;a.click();
      setStatus('ダウンロード完了 ✅','done');
    };
    window.adjustScale=(delta)=>{ fgEditorScale=Math.min(3.0,Math.max(0.1,fgEditorScale+delta));document.getElementById('scaleRange').value=Math.round(fgEditorScale*100);updateEditorTransform(); };
    window.setScaleFromSlider=(val)=>{ fgEditorScale=val/100;updateEditorTransform(); };
    window.resetEditorTransform=()=>{ fgEditorX=0;fgEditorY=0;fgEditorScale=1.0;document.getElementById('scaleRange').value=100;updateEditorTransform(); };

    // ─────────────────────────────────────────────
    // AI自動調整合成
    // ─────────────────────────────────────────────
    window.runComposite=async()=>{
      if(!processedBlobUrl){alert('先に背景削除を実行してください。');return;}
      const bgUrl=customBgUrl||selectedBgImageUrl;
      if(!bgUrl){alert('背景を選択してください。');return;}
      const btn=document.getElementById('compositeBtn');
      btn.disabled=true;btn.innerHTML='<div class="spinner"></div> AI調整中…';
      setStatus('背景を分析してAI自動調整中…','processing');

      let imgW,imgH;
      if(selectedRatio==='1:1'){imgW=1000;imgH=1000;}
      else if(selectedRatio==='4:5'){imgW=800;imgH=1000;}
      else{imgW=1600;imgH=900;}

      try{
        const canvas=document.createElement('canvas');canvas.width=imgW;canvas.height=imgH;
        const ctx=canvas.getContext('2d');

        // ① 背景を描画
        const bgImg=await loadImage(bgUrl);
        const bgScale=Math.max(imgW/bgImg.naturalWidth,imgH/bgImg.naturalHeight);
        const bw=bgImg.naturalWidth*bgScale,bh=bgImg.naturalHeight*bgScale;
        ctx.drawImage(bgImg,(imgW-bw)/2,(imgH-bh)/2,bw,bh);

        // ② 背景を分析 → スマートフィルター計算
        const{filterStr,tilt,shadowAlpha}=calcSmartFilter(ctx,await loadImage(processedBlobUrl),imgW,imgH);

        // ③ 前景を描画（自動調整フィルター + 影 + 自然な傾き適用）
        const fgImg=await loadImage(processedBlobUrl);
        const editorRect=document.getElementById('compositeEditor').getBoundingClientRect();
        const baseW=imgW*0.8,aspect=fgImg.naturalHeight/fgImg.naturalWidth;
        const overlayW=Math.min(Math.round(baseW*fgEditorScale),imgW);
        const overlayH=Math.round(overlayW*aspect);
        const offsetX=Math.round(fgEditorX/editorRect.width*imgW);
        const offsetY=Math.round(fgEditorY/editorRect.height*imgH);
        const cx=(imgW-overlayW)/2+offsetX+overlayW/2;
        const cy=(imgH-overlayH)/2+offsetY+overlayH/2;

        ctx.save();
        ctx.translate(cx,cy);
        ctx.rotate(tilt*Math.PI/180);
        // 影（自然な落ち影）
        ctx.shadowColor=`rgba(0,0,0,${shadowAlpha})`;
        ctx.shadowBlur=overlayW*0.04;
        ctx.shadowOffsetX=overlayW*0.01;
        ctx.shadowOffsetY=overlayW*0.03;
        // フィルター適用
        ctx.filter=filterStr;
        ctx.drawImage(fgImg,-overlayW/2,-overlayH/2,overlayW,overlayH);
        ctx.filter='none';
        ctx.shadowColor='transparent';
        ctx.restore();

        // ④ 複製も同じフィルターで描画
        copies.forEach((copy,i)=>{
          const off=COPY_OFFSETS[i%COPY_OFFSETS.length];
          const cW=Math.min(Math.round(baseW*copy.scale),imgW),cH=Math.round(cW*aspect);
          const ccx=(imgW-cW)/2+offsetX+Math.round(off.dx*imgW)+cW/2;
          const ccy=(imgH-cH)/2+offsetY+Math.round(off.dy*imgH)+cH/2;
          ctx.save();
          ctx.translate(ccx,ccy);
          ctx.rotate(tilt*Math.PI/180);
          ctx.shadowColor=`rgba(0,0,0,${shadowAlpha})`;ctx.shadowBlur=cW*0.04;ctx.shadowOffsetY=cW*0.03;
          ctx.filter=filterStr;
          ctx.drawImage(fgImg,-cW/2,-cH/2,cW,cH);
          ctx.filter='none';ctx.shadowColor='transparent';
          ctx.restore();
        });

        const dataUrl=canvas.toDataURL('image/png');compositeDataUrl=dataUrl;
        document.getElementById('compositeResultImg').src=dataUrl;show('compositeResultArea');
        triggerDownload(dataUrl,`withdoux_${Date.now()}.png`);
        setStatus('AI自動調整して保存しました！🎉','done');

        // 調整内容バッジ表示
        const adj=document.getElementById('adjBadge');
        const brightPct=Math.round((parseFloat(filterStr.match(/brightness\(([^)]+)\)/)[1])-1)*100);
        const tiltDeg=tilt.toFixed(1);
        adj.style.display='block';
        adj.innerHTML=`✨ AI自動調整結果：明るさ${brightPct>=0?'+':''}${brightPct}%　傾き${tiltDeg}°　影・コントラスト補正済み`;

        document.getElementById('compositeResultArea').scrollIntoView({behavior:'smooth',block:'start'});
      }catch(e){alert('❌ 合成エラー: '+e.message);setStatus('合成失敗','');}
      btn.disabled=false;btn.innerHTML='✨ AI自動調整して保存';
    };

    window.addCopy=()=>{ if(copies.length>=3){alert('複製は最大3個まで追加できます。');return;} copies.push({scale:0.5});renderCopiesList(); };
    window.removeCopy=(idx)=>{ copies.splice(idx,1);renderCopiesList(); };
    window.setCopyScale=(idx,val)=>{ copies[idx].scale=val/100;const el=document.getElementById('copyVal'+idx);if(el)el.textContent=val+'%'; };
    window.reDownloadComposite=()=>{ if(compositeDataUrl)triggerDownload(compositeDataUrl,`withdoux_${Date.now()}.png`); };

    function renderPresetImages(genre){
      const scroll=document.getElementById('presetScroll');
      const images=PRESET_GENRES[genre].images;
      scroll.innerHTML=images.map((url,i)=>`<div class="preset-img-btn${i===0?' selected':''}" style="background-image:url(${url})" onclick="selectPresetImage(this,'${url}')"></div>`).join('');
      window.selectPresetImage(scroll.firstElementChild,images[0]);
    }
    function setStatus(text,mode=''){
      const badge=document.getElementById('statusBadge');
      document.getElementById('statusText').textContent=text;
      badge.className=mode?`statusBadge ${mode}`:'statusBadge';badge.style.display='inline-flex';
    }
    function updateEditorBg(url){
      const editor=document.getElementById('compositeEditor');
      if(url){editor.style.backgroundImage=`url(${url})`;editor.style.backgroundSize='cover';editor.style.backgroundPosition='center';editor.style.backgroundColor='';}
      else{editor.style.backgroundImage='';editor.style.backgroundColor='#f0ece6';}
    }
    function initEditor(fgImageUrl){
      fgEditorX=0;fgEditorY=0;fgEditorScale=1.0;
      document.getElementById('scaleRange').value=100;
      document.getElementById('fgEditorImg').src=fgImageUrl;
      updateEditorBg(customBgUrl||selectedBgImageUrl);updateEditorTransform();
    }
    function updateEditorTransform(){
      document.getElementById('fgEditorImg').style.transform=`translate(calc(-50% + ${fgEditorX}px), calc(-50% + ${fgEditorY}px)) scale(${fgEditorScale})`;
    }
    function loadImage(src){
      return new Promise((resolve,reject)=>{
        const img=new Image();
        if(!src.startsWith('blob:')&&!src.startsWith('data:'))img.crossOrigin='anonymous';
        img.onload=()=>resolve(img);img.onerror=()=>reject(new Error('画像の読み込みに失敗しました'));img.src=src;
      });
    }
    function triggerDownload(dataUrl,filename){const a=document.createElement('a');a.href=dataUrl;a.download=filename;a.click();}
    function renderCopiesList(){
      const list=document.getElementById('copiesList');if(!list)return;
      list.innerHTML=copies.map((copy,i)=>{
        const pct=Math.round(copy.scale*100);
        return`<div class="copy-item"><label>複製 ${i+1}　サイズ:</label><input type="range" min="10" max="150" value="${pct}" oninput="setCopyScale(${i},this.value)" style="flex:1;accent-color:var(--rose);" /><span id="copyVal${i}" class="copy-size-val">${pct}%</span><button class="remove-btn" onclick="removeCopy(${i})">&#x2715;</button></div>`;
      }).join('');
    }
    function showPreview(src){document.getElementById('previewArea').innerHTML=`<img src="${src}" alt="プレビュー">`;}
    function show(id){document.getElementById(id).classList.remove('hidden');}
    function hide(id){document.getElementById(id).classList.add('hidden');}

    const compEditor=document.getElementById('compositeEditor');
    compEditor.addEventListener('mousedown',e=>{isDragging=true;dragStartX=e.clientX-fgEditorX;dragStartY=e.clientY-fgEditorY;compEditor.style.cursor='grabbing';});
    document.addEventListener('mousemove',e=>{if(!isDragging)return;fgEditorX=e.clientX-dragStartX;fgEditorY=e.clientY-dragStartY;updateEditorTransform();});
    document.addEventListener('mouseup',()=>{isDragging=false;compEditor.style.cursor='grab';});
    compEditor.addEventListener('touchstart',e=>{
      if(e.touches.length===1){isDragging=true;dragStartX=e.touches[0].clientX-fgEditorX;dragStartY=e.touches[0].clientY-fgEditorY;}
      else if(e.touches.length===2){isDragging=false;pinchStartDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);pinchStartScale=fgEditorScale;}
      e.preventDefault();
    },{passive:false});
    compEditor.addEventListener('touchmove',e=>{
      e.preventDefault();
      if(e.touches.length===1&&isDragging){fgEditorX=e.touches[0].clientX-dragStartX;fgEditorY=e.touches[0].clientY-dragStartY;updateEditorTransform();}
      else if(e.touches.length===2){const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);fgEditorScale=Math.min(3.0,Math.max(0.1,pinchStartScale*dist/pinchStartDist));document.getElementById('scaleRange').value=Math.round(fgEditorScale*100);updateEditorTransform();}
    },{passive:false});
    compEditor.addEventListener('touchend',()=>{isDragging=false;});
  </script>
</body>
</html>
